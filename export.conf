# Export configuration
# Toggle which components to collect. Set to "true" or "false".
# This file is sourced by the export scripts.

# Application configs
EXPORT_VSCODE=true
EXPORT_ITERM2=true
EXPORT_HIDDENBAR=true
EXPORT_CYBERDUCK=true

# Vault-encrypted secrets
EXPORT_SSH_VAULT=true
EXPORT_AWS_VAULT=true
EXPORT_SECRETS_VAULT=true
EXPORT_RCLONE_VAULT=true

# Dotfiles (individual files and directories are controlled
# by the FILES and DIRS arrays in export_dotfiles.sh)
EXPORT_DOTFILES=true

# macOS settings
EXPORT_MACOS_SETTINGS=true
EXPORT_MACOS_DOCK_APPS=true

# Homebrew
EXPORT_HOMEBREW=true

# Firefox
EXPORT_FIREFOX=true
