---
- name: Ensure Homebrew is available
  ansible.builtin.command: brew --version
  register: brew_check
  changed_when: false
  failed_when: brew_check.rc != 0

- name: Update Homebrew
  community.general.homebrew:
    update_homebrew: true
  when: brew_check.rc == 0

- name: Parse taps from Brewfile
  ansible.builtin.set_fact:
    brewfile_taps: "{{ lookup('file', homebrew_brewfile).splitlines() | select('match', '^tap ') | map('regex_replace', '^tap \"(.+?)\".*', '\\1') | list }}"

- name: Parse formulae from Brewfile
  ansible.builtin.set_fact:
    brewfile_formulae: "{{ lookup('file', homebrew_brewfile).splitlines() | select('match', '^brew ') | map('regex_replace', '^brew \"(.+?)\".*', '\\1') | list }}"

- name: Parse casks from Brewfile
  ansible.builtin.set_fact:
    brewfile_casks: "{{ lookup('file', homebrew_brewfile).splitlines() | select('match', '^cask ') | map('regex_replace', '^cask \"(.+?)\".*', '\\1') | list }}"

- name: Load pre-built sudo cask list
  ansible.builtin.set_fact:
    casks_sudo: "{{ lookup('file', playbook_dir + '/files/brew_casks_sudo.txt', errors='ignore') | default('') | split('\n') | select() | list }}"

- name: Classify casks
  ansible.builtin.set_fact:
    casks_nosudo: "{{ brewfile_casks | difference(casks_sudo) }}"

- name: "Add taps ({{ brewfile_taps | length }} total)"
  community.general.homebrew_tap:
    name: "{{ item }}"
  loop: "{{ brewfile_taps }}"
  loop_control:
    label: "{{ item }} ({{ ansible_loop.index }}/{{ ansible_loop.length }})"
    extended: true

- name: "Install formulae ({{ brewfile_formulae | length }} total)"
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop: "{{ brewfile_formulae }}"
  loop_control:
    label: "{{ item }} ({{ ansible_loop.index }}/{{ ansible_loop.length }})"
    extended: true

- name: Create sudo askpass helper for cask installs
  ansible.builtin.copy:
    dest: /tmp/.brew_askpass
    mode: "0700"
    content: |
      #!/bin/bash
      echo '{{ ansible_become_password }}'
  when: ansible_become_password is defined
  no_log: true

- name: "Install casks - no sudo ({{ casks_nosudo | length }} total)"
  ansible.builtin.shell: brew install --cask '{{ item }}'
  loop: "{{ casks_nosudo }}"
  loop_control:
    label: "{{ item }} ({{ ansible_loop.index }}/{{ ansible_loop.length }})"
    extended: true
  register: cask_nosudo_results
  changed_when: "cask_nosudo_results.rc == 0 and 'already installed' not in (cask_nosudo_results.stderr | default(''))"
  failed_when: false

- name: "Install casks - sudo required ({{ casks_sudo | length }} total)"
  ansible.builtin.shell: brew install --cask '{{ item }}'
  environment: "{{ {'SUDO_ASKPASS': '/tmp/.brew_askpass'} if ansible_become_password is defined else {} }}"
  loop: "{{ casks_sudo }}"
  loop_control:
    label: "{{ item }} ({{ ansible_loop.index }}/{{ ansible_loop.length }})"
    extended: true
  register: cask_sudo_results
  changed_when: "cask_sudo_results.rc == 0 and 'already installed' not in (cask_sudo_results.stderr | default(''))"
  failed_when: false

- name: Remove sudo askpass helper
  ansible.builtin.file:
    path: /tmp/.brew_askpass
    state: absent

- name: Report failed cask installs
  ansible.builtin.debug:
    msg: "Failed casks (install manually): {{ failed_list }}"
  vars:
    failed_list: >-
      {{
        (cask_nosudo_results.results | default([]) | selectattr('rc', 'ne', 0) | map(attribute='item') | list) +
        (cask_sudo_results.results | default([]) | selectattr('rc', 'ne', 0) | map(attribute='item') | list)
      }}
  when: failed_list | length > 0
