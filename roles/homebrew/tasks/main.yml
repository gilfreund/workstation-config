---
- name: Ensure Homebrew is available
  ansible.builtin.command: brew --version
  register: brew_check
  changed_when: false
  failed_when: brew_check.rc != 0

- name: Update Homebrew
  community.general.homebrew:
    update_homebrew: true
  when: brew_check.rc == 0

- name: Parse taps from Brewfile
  ansible.builtin.set_fact:
    brewfile_taps: "{{ lookup('file', homebrew_brewfile).splitlines() | select('match', '^tap ') | map('regex_replace', '^tap \"(.+?)\".*', '\\1') | list }}"

- name: Parse formulae from Brewfile
  ansible.builtin.set_fact:
    brewfile_formulae: "{{ lookup('file', homebrew_brewfile).splitlines() | select('match', '^brew ') | map('regex_replace', '^brew \"(.+?)\".*', '\\1') | list }}"

- name: Parse casks from Brewfile
  ansible.builtin.set_fact:
    brewfile_casks: "{{ lookup('file', homebrew_brewfile).splitlines() | select('match', '^cask ') | map('regex_replace', '^cask \"(.+?)\".*', '\\1') | list }}"

- name: "Add taps ({{ brewfile_taps | length }} total)"
  community.general.homebrew_tap:
    name: "{{ item }}"
  loop: "{{ brewfile_taps }}"
  loop_control:
    label: "{{ item }} ({{ ansible_loop.index }}/{{ ansible_loop.length }})"
    extended: true

- name: "Install formulae ({{ brewfile_formulae | length }} total)"
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop: "{{ brewfile_formulae }}"
  loop_control:
    label: "{{ item }} ({{ ansible_loop.index }}/{{ ansible_loop.length }})"
    extended: true

# --- Dynamic cask classification ---
# Query each cask's JSON to detect pkg artifacts (which require sudo)
- name: Query cask metadata for pkg detection
  ansible.builtin.shell: >
    brew info --json=v2 --cask '{{ item }}' 2>/dev/null | grep -q '"pkg"' && echo "pkg" || echo "nopkg"
  loop: "{{ brewfile_casks }}"
  loop_control:
    label: "{{ item }}"
  register: cask_pkg_check
  changed_when: false
  failed_when: false

- name: Classify casks into sudo and non-sudo groups
  ansible.builtin.set_fact:
    casks_sudo: "{{ cask_pkg_check.results | selectattr('stdout', 'eq', 'pkg') | map(attribute='item') | list }}"
    casks_nosudo: "{{ cask_pkg_check.results | selectattr('stdout', 'eq', 'nopkg') | map(attribute='item') | list }}"

- name: Show cask classification
  ansible.builtin.debug:
    msg:
      - "Casks requiring sudo (pkg): {{ casks_sudo }}"
      - "Casks without sudo: {{ casks_nosudo }}"

# --- Install non-sudo casks ---
- name: "Install casks - no sudo ({{ casks_nosudo | length }} total)"
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
  loop: "{{ casks_nosudo }}"
  loop_control:
    label: "{{ item }} ({{ ansible_loop.index }}/{{ ansible_loop.length }})"
    extended: true
  register: cask_nosudo_results
  failed_when: false

# --- Install sudo casks ---
- name: "Install casks - sudo required ({{ casks_sudo | length }} total)"
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
    sudo_password: "{{ ansible_become_password | default(omit) }}"
  loop: "{{ casks_sudo }}"
  loop_control:
    label: "{{ item }} ({{ ansible_loop.index }}/{{ ansible_loop.length }})"
    extended: true
  register: cask_sudo_results
  failed_when: false

# --- Report any failures ---
- name: Collect all failed casks
  ansible.builtin.set_fact:
    failed_casks: >-
      {{
        (cask_nosudo_results.results | default([]) | selectattr('failed', 'true') | map(attribute='item') | list) +
        (cask_sudo_results.results | default([]) | selectattr('failed', 'true') | map(attribute='item') | list)
      }}

- name: Report failed cask installs
  ansible.builtin.debug:
    msg: "Failed casks (install manually): {{ failed_casks }}"
  when: failed_casks | length > 0
