---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ debian_packages }}"
    state: present
  become: true

- name: Set default shell to zsh
  ansible.builtin.user:
    name: "{{ user_name }}"
    shell: /usr/bin/zsh
  become: true
  when: "'/usr/bin/zsh' != ansible_user_shell"
