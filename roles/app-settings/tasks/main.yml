---
# --- VS Code ---
- name: Check if VS Code is installed
  ansible.builtin.command: which code
  register: vscode_check
  changed_when: false
  failed_when: false
  when: app_configs.vscode | default(true)

- name: Restore VS Code settings
  when:
    - app_configs.vscode | default(true)
    - vscode_check.rc | default(1) == 0
  block:
    - name: Ensure VS Code User directory exists
      ansible.builtin.file:
        path: "{{ user_home }}/Library/Application Support/Code/User"
        state: directory
        owner: "{{ user_name }}"
        mode: "0755"

    - name: Copy VS Code settings.json
      ansible.builtin.copy:
        src: "app-configs/vscode/settings.json"
        dest: "{{ user_home }}/Library/Application Support/Code/User/settings.json"
        owner: "{{ user_name }}"
        mode: "0644"
        backup: true
      when: lookup('fileglob', playbook_dir + '/files/app-configs/vscode/settings.json') | length > 0

    - name: Expand __USER_HOME__ in VS Code settings
      ansible.builtin.shell: >
        sed -i '' 's|__USER_HOME__|{{ user_home }}|g'
        '{{ user_home }}/Library/Application Support/Code/User/settings.json'
      changed_when: true
      when: lookup('fileglob', playbook_dir + '/files/app-configs/vscode/settings.json') | length > 0

    - name: Copy VS Code keybindings.json
      ansible.builtin.copy:
        src: "app-configs/vscode/keybindings.json"
        dest: "{{ user_home }}/Library/Application Support/Code/User/keybindings.json"
        owner: "{{ user_name }}"
        mode: "0644"
        backup: true
      when: lookup('fileglob', playbook_dir + '/files/app-configs/vscode/keybindings.json') | length > 0

    - name: Copy VS Code snippets
      ansible.builtin.copy:
        src: "app-configs/vscode/snippets/"
        dest: "{{ user_home }}/Library/Application Support/Code/User/snippets/"
        owner: "{{ user_name }}"
        mode: "0644"
        backup: true
      when: lookup('fileglob', playbook_dir + '/files/app-configs/vscode/snippets/*') | length > 0

    - name: Install VS Code extensions
      ansible.builtin.command: code --install-extension {{ item }}
      loop: "{{ lookup('file', playbook_dir + '/files/app-configs/vscode/extensions.txt').splitlines() }}"
      register: vscode_ext
      changed_when: "'was successfully installed' in vscode_ext.stdout"
      failed_when: false
      when: lookup('fileglob', playbook_dir + '/files/app-configs/vscode/extensions.txt') | length > 0

# --- iTerm2 ---
- name: Restore iTerm2 preferences
  ansible.builtin.command: >
    defaults import com.googlecode.iterm2
    {{ playbook_dir }}/files/app-configs/iterm2/com.googlecode.iterm2.plist
  when:
    - app_configs.iterm2 | default(true)
    - ansible_facts['os_family'] == "Darwin"
    - lookup('fileglob', playbook_dir + '/files/app-configs/iterm2/com.googlecode.iterm2.plist') | length > 0
  changed_when: true

# --- Hidden Bar ---
- name: Restore Hidden Bar preferences
  ansible.builtin.command: >
    defaults import com.dwarvesv.minimalbar
    {{ playbook_dir }}/files/app-configs/hiddenbar/com.dwarvesv.minimalbar.plist
  when:
    - app_configs.hiddenbar | default(true)
    - ansible_facts['os_family'] == "Darwin"
    - lookup('fileglob', playbook_dir + '/files/app-configs/hiddenbar/com.dwarvesv.minimalbar.plist') | length > 0
  changed_when: true

# --- Cyberduck ---
- name: Restore Cyberduck preferences
  ansible.builtin.command: >
    defaults import ch.sudo.cyberduck
    {{ playbook_dir }}/files/app-configs/cyberduck/ch.sudo.cyberduck.plist
  when:
    - app_configs.cyberduck | default(true)
    - ansible_facts['os_family'] == "Darwin"
    - lookup('fileglob', playbook_dir + '/files/app-configs/cyberduck/ch.sudo.cyberduck.plist') | length > 0
  changed_when: true

# --- Microsoft 365 ---
- name: Restore M365 preferences
  ansible.builtin.command: >
    defaults import {{ item.domain }}
    {{ playbook_dir }}/files/app-configs/m365/{{ item.domain }}.plist
  loop:
    - { domain: "com.microsoft.office" }
    - { domain: "com.microsoft.teams" }
    - { domain: "com.microsoft.teams2" }
    - { domain: "com.microsoft.Outlook" }
  loop_control:
    label: "{{ item.domain }}"
  when:
    - app_configs.m365 | default(true)
    - ansible_facts['os_family'] == "Darwin"
    - lookup('fileglob', playbook_dir + '/files/app-configs/m365/' + item.domain + '.plist') | length > 0
  changed_when: true

# --- Mackup (optional) ---
- name: Check if mackup is installed
  ansible.builtin.command: which mackup
  register: mackup_installed
  changed_when: false
  failed_when: false
  when: mackup_enabled

- name: Copy mackup configuration
  ansible.builtin.copy:
    src: "mackup/.mackup.cfg"
    dest: "{{ user_home }}/.mackup.cfg"
    owner: "{{ user_name }}"
    mode: "0644"
    backup: true
  when:
    - mackup_enabled
    - mackup_installed.rc == 0

- name: Restore application settings with mackup
  ansible.builtin.command: mackup restore --force
  register: mackup_restore
  changed_when: "'Restored' in mackup_restore.stdout"
  when:
    - mackup_enabled
    - mackup_installed.rc == 0

# --- Thunderbird ---
- name: Restore Thunderbird mail settings
  when:
    - app_configs.thunderbird | default(true)
    - ansible_facts['os_family'] == "Darwin"
  block:
    - name: Ensure Thunderbird profile directory exists
      ansible.builtin.file:
        path: "{{ user_home }}/Library/Thunderbird/Profiles"
        state: directory
        owner: "{{ user_name }}"
        mode: "0755"

    - name: Copy Thunderbird profiles.ini
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/exports/thunderbird/profiles.ini"
        dest: "{{ user_home }}/Library/Thunderbird/profiles.ini"
        owner: "{{ user_name }}"
        mode: "0644"
        backup: true
      when: lookup('fileglob', playbook_dir + '/exports/thunderbird/profiles.ini') | length > 0

    - name: Determine Thunderbird profile path
      ansible.builtin.shell: |
        awk -F= '/^\[Install/{found=1} found && /^Default=/{print $2; exit}' \
          "{{ user_home }}/Library/Thunderbird/profiles.ini"
      register: tb_profile_path
      changed_when: false
      failed_when: false

    - name: Ensure Thunderbird profile directory exists
      ansible.builtin.file:
        path: "{{ user_home }}/Library/Thunderbird/{{ tb_profile_path.stdout }}"
        state: directory
        owner: "{{ user_name }}"
        mode: "0755"
      when: tb_profile_path.stdout | length > 0

    - name: Decrypt and inject mail prefs into prefs.js
      when:
        - tb_profile_path.stdout | length > 0
        - lookup('fileglob', playbook_dir + '/files/secrets/thunderbird_mail_prefs.vault') | length > 0
      block:
        - name: Decrypt mail prefs vault
          ansible.builtin.copy:
            src: "secrets/thunderbird_mail_prefs.vault"
            dest: "/tmp/thunderbird_mail_prefs.js"
            owner: "{{ user_name }}"
            mode: "0600"

        - name: Ensure prefs.js exists
          ansible.builtin.file:
            path: "{{ user_home }}/Library/Thunderbird/{{ tb_profile_path.stdout }}/prefs.js"
            state: touch
            owner: "{{ user_name }}"
            mode: "0644"

        - name: Append mail prefs to prefs.js (skip duplicates)
          ansible.builtin.shell: |
            prefs="{{ user_home }}/Library/Thunderbird/{{ tb_profile_path.stdout }}/prefs.js"
            while IFS= read -r line; do
              key=$(echo "$line" | sed 's/^user_pref("\([^"]*\)".*/\1/')
              grep -qF "\"${key}\"" "$prefs" || echo "$line" >> "$prefs"
            done < /tmp/thunderbird_mail_prefs.js
          changed_when: true

        - name: Clean up temp mail prefs
          ansible.builtin.file:
            path: /tmp/thunderbird_mail_prefs.js
            state: absent

    - name: Decrypt and extract message filters
      when:
        - tb_profile_path.stdout | length > 0
        - lookup('fileglob', playbook_dir + '/files/secrets/thunderbird_filters.vault') | length > 0
      block:
        - name: Decrypt filters vault
          ansible.builtin.copy:
            src: "secrets/thunderbird_filters.vault"
            dest: "/tmp/thunderbird_filters.tar.gz"
            owner: "{{ user_name }}"
            mode: "0600"

        - name: Extract message filters into profile
          ansible.builtin.command:
            cmd: tar xzf /tmp/thunderbird_filters.tar.gz -C "{{ user_home }}/Library/Thunderbird/{{ tb_profile_path.stdout }}"
          changed_when: true

        - name: Clean up temp filters archive
          ansible.builtin.file:
            path: /tmp/thunderbird_filters.tar.gz
            state: absent
