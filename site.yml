---
- name: Configure workstation
  hosts: localhost
  connection: local
  gather_facts: true

  pre_tasks:
    - name: Group host by OS family
      ansible.builtin.group_by:
        key: "{{ ansible_facts['os_family'] | lower }}"
      tags: always

    - name: Display target system info
      ansible.builtin.debug:
        msg: "Configuring {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }} ({{ ansible_facts['architecture'] }})"

  roles:
    - role: dotfiles
      tags: [dotfiles]

    - role: homebrew
      tags: [homebrew]
      when: ansible_facts['os_family'] == "Darwin" or homebrew_linux_enabled | default(false)

    - role: mac-settings
      tags: [mac-settings]
      when: ansible_facts['os_family'] == "Darwin"

    - role: app-settings
      tags: [app-settings]

    - role: debian-common
      tags: [debian]
      when: ansible_facts['os_family'] == "Debian"
