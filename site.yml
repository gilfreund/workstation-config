---
- name: Configure workstation
  hosts: localhost
  connection: local
  gather_facts: true

  pre_tasks:
    - name: Display target system info
      ansible.builtin.debug:
        msg: "Configuring {{ ansible_distribution }} {{ ansible_distribution_version }} ({{ ansible_architecture }})"

  roles:
    - role: dotfiles
      tags: [dotfiles]

    - role: homebrew
      tags: [homebrew]
      when: ansible_os_family == "Darwin" or homebrew_linux_enabled | default(false)

    - role: mac-settings
      tags: [mac-settings]
      when: ansible_os_family == "Darwin"

    - role: app-settings
      tags: [app-settings]

    - role: debian-common
      tags: [debian]
      when: ansible_os_family == "Debian"
