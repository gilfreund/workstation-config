[storage]
engine = icloud
# Alternative: engine = file_system
# path = /path/to/mackup/storage

[applications_to_sync]
# Uncomment apps you want Mackup to manage.
# These are apps whose preferences Mackup knows how to back up.
# See: https://github.com/lra/mackup#supported-applications
#
# iterm2
# visual-studio-code
# sublime-text

[applications_to_ignore]
# Apps to explicitly skip. Useful if Mackup tries to sync something
# you'd rather manage via Ansible or manually.
#
# git  -- managed via dotfiles role
# zsh  -- managed via dotfiles role
